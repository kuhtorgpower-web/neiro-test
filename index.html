</style>

    app.innerHTML = `
      <div class="screen hero">
        <div class="hero-eyebrow">Тест · 10 вопросов · 1 минута</div>
        <h1>Какая ты нейросеть?</h1>
        <p>Узнай, на какую модель ИИ ты похож характером.<br>Возможно, не на ту, на которую думаешь.</p>
        <div class="hero-models">
          <span class="hero-model">Claude</span>
          <span class="hero-model">GPT</span>
          <span class="hero-model">Gemini</span>
          <span class="hero-model">Grok</span>
          <span class="hero-model">DeepSeek</span>
          <span class="hero-model">Perplexity</span>
          <span class="hero-model">Qwen</span>
          <span class="hero-model">Алиса</span>
        </div>
        <button class="btn" id="start">Начать</button>
        ${footer()}
      </div>
    `;
    document.getElementById('start').onclick = renderExpectation;
  }

  function renderExpectation() {
    state.screen = 'expectation';
    state.step = 0;
    state.votes = [];
    const keys = Object.keys(MODELS);
    app.innerHTML = `
      <div class="screen expectation">
        <h2>А кем ты <em>думаешь</em>, ты окажешься?</h2>
        <p>Запомним. Потом сравним.</p>
        <div class="expectation-grid">
          ${keys.map(k => `<button class="option" data-key="${k}">${MODELS[k].name}</button>`).join('')}
        </div>
        <button class="option" id="skip-expect" style="text-align:center;color:var(--fg-mute);">Пропустить</button>
        ${footer()}
      </div>
    `;
    app.querySelectorAll('.option[data-key]').forEach(btn => {
      btn.onclick = () => { state.expected = btn.dataset.key; renderQuestion(); };
    });
    document.getElementById('skip-expect').onclick = () => { state.expected = null; renderQuestion(); };
  }

  function renderQuestion() {
    state.screen = 'question';
    const i = state.step;
    const q = QUESTIONS[i];
    const opts = shuffle(q.a);
    const pct = Math.round((i / QUESTIONS.length) * 100);

    app.innerHTML = `
      <div class="screen">
        <div class="progress">
          <div class="progress-text"><span>${i + 1} / ${QUESTIONS.length}</span><span>${pct}%</span></div>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        </div>
        <div class="question">${q.q}</div>
        <div class="options">
          ${opts.map(o => `<button class="option" data-model="${o.m}">${o.t}</button>`).join('')}
        </div>
        ${footer()}
      </div>
    `;

    app.querySelectorAll('.option').forEach(btn => {
      btn.onclick = () => {
        const isLast = state.step === QUESTIONS.length - 1;
        state.votes.push({ model: btn.dataset.model, weight: isLast ? 1.5 : 1 });
        state.step++;
        if (state.step >= QUESTIONS.length) renderResult();
        else { window.scrollTo({ top: 0, behavior: 'smooth' }); renderQuestion(); }
      };
    });
  }

  function renderResult() {
    state.screen = 'result';
    const totals = {};
    Object.keys(MODELS).forEach(k => totals[k] = 0);
    state.votes.forEach(v => totals[v.model] += v.weight);
    const sum = Object.values(totals).reduce((a, b) => a + b, 0);

    const ranked = Object.entries(totals)
      .map(([k, v]) => ({ key: k, score: v, pct: Math.round((v / sum) * 100) }))
      .sort((a, b) => b.score - a.score);

    const winnerKey = ranked[0].key;
    const winner = MODELS[winnerKey];
    const winnerPct = ranked[0].pct;

    let twist = '';
    if (state.expected && state.expected !== winnerKey) {
      twist = `<div class="result-twist">Ты думал, будешь <strong>${MODELS[state.expected].name}</strong>.<br>Но тест говорит — <strong>${winner.name}</strong>.</div>`;
    } else if (state.expected === winnerKey) {
      twist = `<div class="result-twist">А ты себя знаешь — <strong>${winner.name}</strong> и есть.</div>`;
    }

    const shareText = state.expected && state.expected !== winnerKey
      ? `Я думал, буду ${MODELS[state.expected].name}.\n\nНо тест сказал: ${winner.name}.\n\nБольно.\n\n→ ${SITE_URL}`
      : `Я — ${winner.name} (${winnerPct}%).\n\n${winner.strength}\n\nА ты? → ${SITE_URL}`;

    app.innerHTML = `
      <div class="screen">
        <div class="result-header">
          <div class="result-eyebrow">ТЫ —</div>
          <div class="result-name">${winner.name}</div>
          <div class="result-pct">${winnerPct}% совпадение</div>
        </div>

        ${twist}

        <div class="result-card">
          <div class="result-card-label">СИЛЬНАЯ СТОРОНА</div>
          <div class="result-card-value">${winner.strength}</div>
        </div>

        <div class="result-card">
          <div class="result-card-label">ГЛАВНЫЙ БАГ</div>
          <div class="result-card-value">${winner.bug}</div>
        </div>

        <div class="result-card">
          <div class="result-card-label">НЕСОВМЕСТИМ С</div>
          <div class="result-card-value"><span class="result-vs-name">${winner.vs}</span> — ${winner.vsReason}</div>
        </div>

        <div class="result-runners">
          <div class="result-runner"><span class="result-runner-rank">2</span><span class="result-runner-name">${MODELS[ranked[1].key].name}</span><span class="result-runner-pct">${ranked[1].pct}%</span></div>
          <div class="result-runner"><span class="result-runner-rank">3</span><span class="result-runner-name">${MODELS[ranked[2].key].name}</span><span class="result-runner-pct">${ranked[2].pct}%</span></div>
        </div>

        <div class="teaser">
          <div class="teaser-eyebrow">СКОРО</div>
          <div class="teaser-title">Следующий тест: каким тебя видят другие?</div>
          <a href="${NEXT_TEST_URL}" target="_blank" rel="noopener noreferrer" class="teaser-btn">Узнать первым</a>
        </div>

        <div class="result-buttons">
          <button class="btn" id="share-tg">Поделиться в Telegram</button>
          <button class="btn btn-ghost" id="share-copy">Скопировать</button>
        </div>
        <button class="btn btn-ghost btn-block" id="restart">Пройти ещё раз</button>
        ${footer()}
      </div>
    `;

    document.getElementById('share-tg').onclick = () => {
      const url = `https://t.me/share/url?url=${encodeURIComponent(SITE_URL)}&text=${encodeURIComponent(shareText)}`;
      window.open(url, '_blank', 'noopener,noreferrer');
    };

    document.getElementById('share-copy').onclick = () => {
      const fallback = () => {
        const ta = document.createElement('textarea');
        ta.value = shareText;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); showToast('Скопировано'); }
        catch (e) { showToast('Не удалось'); }
        document.body.removeChild(ta);
      };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(shareText).then(() => showToast('Скопировано')).catch(fallback);
      } else fallback();
    };

    document.getElementById('restart').onclick = () => {
      state = { screen: 'hero', step: 0, votes: [], expected: null };
      window.scrollTo({ top: 0, behavior: 'smooth' });
      renderHero();
    };
  }

  function footer() {
    const tgUser = TELEGRAM.replace('@', '');
    return `<div class="footer">Сделал <a href="https://t.me/${tgUser}" target="_blank" rel="noopener noreferrer">${TELEGRAM}</a></div>`;
  }

  renderHero();
})();
</script>
</body>
</html>
